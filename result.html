<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar bg-white border-bottom sticky-top">
      <div class="container d-flex justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <div class="brand-badge"></div><strong>AI Mock Interview</strong>
        </div>
        <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Dashboard</a>
      </div>
    </nav>

    <main class="container py-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="h4 m-0">Result</h2>
    <span id="scoreBadge" class="badge bg-dark fs-6">Score</span>
  </div>

  <!-- BEHAVIORAL RESULT CARDS (hidden by default, shown only for behavioral) -->
  <div id="behavioralResult" class="vstack gap-3 d-none"></div>
<h5 class="mt-4">Answer review</h5>
<div id="answerReview" class="vstack gap-3"></div>

  <!-- MCQ RESULT (topic-wise cards) -->
  <div id="mcqResult">
    <div class="row g-3" id="topicGrid"></div>
  </div>

  <div class="mt-4 d-flex gap-2">
    <a href="round.html" class="btn btn-outline-secondary">Retake</a>
    <a href="dashboard.html" class="btn btn-dark">Go to dashboard</a>
  </div>
</main>


    <script src="app.js"></script>
    <script>window.pageInit && window.pageInit('result');</script>
  </body>
</html>
