<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar bg-white border-bottom sticky-top">
      <div class="container d-flex justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <div class="brand-badge"></div><strong>AI Mock Interview</strong>
        </div>
        <div class="badge text-bg-light timer-badge" id="timeLeft">--:--</div>
      </div>
    </nav>

 <main class="container py-4">
  <!-- questions render here -->
  <div id="examBody" class="vstack gap-3"></div>

  <!-- pager / controls -->
  <div class="d-flex justify-content-between align-items-center mt-4">
    <div class="d-flex gap-2 align-items-center">
      <button id="examPrev" class="btn btn-outline-secondary" disabled>◀ Previous</button>
      <button id="examNext" class="btn btn-outline-secondary">Next ▶</button>
      <div id="pageInfo" class="small text-secondary ms-3">Page 1 of 1</div>
    </div>

    <div class="d-flex gap-2">
      <a href="round.html" class="btn btn-outline-secondary">Cancel</a>
      <button id="submitExam" class="btn btn-dark">Submit</button>
    </div>
  </div>
</main>

    <script src="app.js"></script>
    <script>window.pageInit && window.pageInit('exam');</script>
  </body>
</html>
