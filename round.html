<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Choose Round</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar bg-white border-bottom sticky-top">
      <div class="container d-flex justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <div class="brand-badge"></div><strong>AI Mock Interview</strong>
        </div>
        <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Dashboard</a>
      </div>
    </nav>

    <main class="container py-4">
      <div class="text-center mb-3">
        <h2>Choose your round</h2>
        <div class="small-note">Start with Technical or go for Aptitude practice.</div>
      </div>
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <div class="card card-raise shadow-sm">
            <div class="card-body">
              <div class="h5">Technical</div>
              <div class="small-note">Pick subjects like Python, Java, Web, DBMS, OS, C.</div>
              <button id="btnTechnical" class="btn btn-dark mt-2">Choose Technical</button>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
  <div class="card card-raise shadow-sm">
    <div class="card-body">
      <div class="h5">Behavioral (HR)</div>
      <div class="small-note">Answer by speaking. We’ll analyze structure, clarity, tone & impact.</div>
      <button id="btnBehavioral" class="btn btn-dark mt-2">Choose Behavioral</button>
    </div>
  </div>
</div>

        <div class="col-12 col-md-6">
          <div class="card card-raise shadow-sm">
            <div class="card-body">
              <div class="h5">Aptitude</div>
              <div class="small-note">Quant, Reasoning, and Verbal buckets.</div>
              <button id="btnAptitude" class="btn btn-dark mt-2">Choose Aptitude</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <script>window.pageInit && window.pageInit('round');</script>
  </body>
</html>
