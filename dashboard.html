<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar bg-white border-bottom sticky-top">
      <div class="container d-flex justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <div class="brand-badge"></div><strong>AI Mock Interview</strong>
        </div>
        <div>
          <a href="round.html" class="btn btn-dark btn-sm">Start new round</a>
          <button id="logoutBtn" class="btn btn-outline-secondary btn-sm ms-2">Logout</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h2 class="h4 m-0">Dashboard</h2>
          <div class="small-note" id="welcomeText"></div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-12 col-md-4">
          <div class="card shadow-sm"><div class="card-body"><div class="text-secondary small">Attempts</div><div class="fs-3" id="statAttempts">0</div></div></div>
        </div>
        <div class="col-12 col-md-4">
          <div class="card shadow-sm"><div class="card-body"><div class="text-secondary small">Best %</div><div class="fs-3" id="statBest">0%</div></div></div>
        </div>
        <div class="col-12 col-md-4">
          <div class="card shadow-sm"><div class="card-body"><div class="text-secondary small">Avg %</div><div class="fs-3" id="statAvg">0%</div></div></div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="fw-medium mb-2">Recent attempts</div>
          <div class="table-responsive">
            <table class="table align-middle" id="historyTable">
              <thead class="table-light">
                <tr><th>Date</th><th>Round</th><th>Subjects</th><th>Score</th><th>%</th></tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <script>window.pageInit && window.pageInit('dashboard');</script>
  </body>
</html>
